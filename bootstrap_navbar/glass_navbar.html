<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Glass Navbar</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: url("/bootstrap_navbar/background\ image.jpg") no-repeat
          center center/cover;
        height: 100vh;
      }

      .hero {
        display: flex;
        justify-content: center;
        padding-top: 50px;
      }

      .navbar-custom {
        width: 900px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 50px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        font-size: 20px;
        font-weight: bold;
      }

      .menu {
        display: flex;
        list-style: none;
        gap: 30px;
        margin: 0;
      }

      .menu a {
        text-decoration: none;
        color: white;
        font-size: 15px;
        transition: 0.3s;
      }

      .menu a:hover {
        color: #ddd;
      }

      .right-side {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .theme-btn {
        width: 60px;
        height: 36px;
        border: none;
        border-radius: 30px;
        background: white;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        cursor: pointer;
      }

      .theme-btn i {
        color: #555;
      }

      .start-btn {
        border: none;
        padding: 10px 25px;
        border-radius: 30px;
        background: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .start-btn:hover {
        background: #111;
        color: white;
      }

      .content {
        max-width: 800px;
        margin: 170px auto 0; /* This creates a big gap */
        text-align: center;
        color: white;
        padding: 0 20px;
      }

      .content h3 {
        font-size: 60px;
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 20px;
      }

      .content p {
        font-size: 18px;
        line-height: 1.8;
        max-width: 650px;
        margin: 0 auto 35px;
        color: rgba(255, 255, 255, 0.9);
      }

      /* Buttons */
      .hero-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <nav class="navbar-custom">
        <div class="logo">
          <i class="bi bi-hexagon-fill"></i>
          <span>Tourera</span>
        </div>

        <ul class="menu">
          <li><a href="#">Services</a></li>
          <li><a href="#">Industries</a></li>
          <li><a href="#">News</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <div class="right-side">
          <button class="theme-btn">
            <i class="bi bi-brightness-high-fill"></i>
            <i class="bi bi-moon-fill"></i>
          </button>

          <button class="start-btn">Get Started</button>
        </div>
      </nav>
    </div>

    <div class="content">
      <h3>Discover Your Next Adventure</h3>
      <p>
        Explore breathtaking destination,unforgettable experiance, and
        personalized travel packages designed to make every journey memorable.
      </p>
    </div>

    <div class="hero-buttons">
      <button class="start-btn">Explore Tours</button>

      <button class="start-btn">Book Now</button>
    </div>
  </body>
</html>
