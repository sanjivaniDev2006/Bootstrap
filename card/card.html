<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card bg-white">
                    <img src="/card/luxova Set Of 8 Skincare Combo Kit.jpg" alt="" class="card-img-top">
                    <div class="card-body">
                        <h3 class="card-title text-dark">LUXOVA</h3>
                        <p class="card-text text-muted">Luxova is committed to offering premium products to elevate the skincare experience for customers who seek indulgence, efficacy, and sustainability. Our products are meticulously formulated and crafted with natural, cruelty-free ingredients</p>
                    <button class="btn btn-outline-dark">Buy Now</button>

                  <a href="https:www.luxova.in" target="_blank">visit official website</a>
            
                
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
